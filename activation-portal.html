<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Network | Enable Automatic Economy</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 20px;
      line-height: 1.3;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      box-sizing: border-box;
      margin-bottom: 12px;
      font-size: 14px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #card-section {
      display: none;
      margin-top: 18px;
    }

    #card-element {
      background: #ffffff;
      padding: 12px;
      border-radius: 6px;
      margin-top: 10px;
      color: #111827;
      min-height: 22px;
      box-sizing: border-box;
    }

    #status {
      margin-top: 18px;
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.5;
      min-height: 24px;
    }

    .small-note {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.88;
      line-height: 1.5;
    }

    .success {
      color: #bbf7d0;
    }

    .error {
      color: #fecaca;
    }

    .muted {
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Enable Automatic Economy</h2>

    <label for="agent_id">Agent ID</label>
    <input id="agent_id" placeholder="Enter the agent ID" />

    <button id="startBtn" type="button">Start</button>

    <div id="card-section">
      <label>Card details</label>
      <div id="card-element"></div>
      <button id="confirmBtn" type="button">Confirm Card</button>
      <div class="small-note">
        This step securely authorizes a payment method for future automatic top-ups.
      </div>
    </div>

    <p id="status" class="muted"></p>
  </div>

  <script>
    const stripe = Stripe("pk_live_51SyDRBLFZaThHtbwrMmrPFpLmKs44lLEddsGLkwzxlJBtsDA6M4PbVbG9bdyqBc33E9NPcBo5EPqJhwQ7guCfAAL00zxGiy0eN");

    const startBtn = document.getElementById("startBtn");
    const confirmBtn = document.getElementById("confirmBtn");
    const statusEl = document.getElementById("status");
    const cardSection = document.getElementById("card-section");
    const agentIdInput = document.getElementById("agent_id");

    let elements = null;
    let card = null;
    let cardMounted = false;
    let clientSecret = null;
    let agentId = null;
    let stripeCustomerId = null;
    let setupStarted = false;
    let setupCompleted = false;

    function setStatus(message, type = "muted") {
      statusEl.innerText = message;
      statusEl.className = type;
    }

    function setLoading(button, isLoading, loadingText, defaultText) {
      button.disabled = isLoading;
      button.innerText = isLoading ? loadingText : defaultText;
    }

    async function startSetup() {
      if (setupCompleted) {
        setStatus(
          "Automatic economy has already been enabled for this session. Reload the page only if you want to configure another agent.",
          "success"
        );
        return;
      }

      if (setupStarted && cardMounted && clientSecret) {
        setStatus(
          "Setup session already created. Enter the card details below and click Confirm Card.",
          "muted"
        );
        return;
      }

      try {
        agentId = agentIdInput.value.trim();

        if (!agentId) {
          setStatus("Please enter a valid agent ID.", "error");
          return;
        }

        setLoading(startBtn, true, "Starting...", "Start");
        setStatus("Creating secure setup session...", "muted");

        const res = await fetch(
          "https://vxbujgzswbakdjnfgetk.supabase.co/functions/v1/create-autotopup-setup-intent",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              agent_id: agentId
            })
          }
        );

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Failed to create setup session.");
        }

        clientSecret = data.client_secret;
        stripeCustomerId = data.stripe_customer_id;

        if (!clientSecret) {
          throw new Error("Missing client_secret from setup response.");
        }

        if (!elements) {
          elements = stripe.elements();
        }

        if (!card) {
          card = elements.create("card");
        }

        if (!cardMounted) {
          card.mount("#card-element");
          cardMounted = true;
        }

        setupStarted = true;
        cardSection.style.display = "block";
        setStatus("Setup session created. Enter card details below.", "muted");
      } catch (error) {
        setStatus(error?.message || "Unexpected error while starting setup.", "error");
      } finally {
        setLoading(startBtn, false, "Starting...", "Start");
      }
    }

    async function confirmCard() {
      try {
        if (setupCompleted) {
          setStatus("Automatic economy is already enabled for this agent.", "success");
          return;
        }

        if (!clientSecret) {
          setStatus("Start the setup flow first.", "error");
          return;
        }

        if (!card) {
          setStatus("Card form is not ready yet. Click Start first.", "error");
          return;
        }

        setLoading(confirmBtn, true, "Confirming...", "Confirm Card");
        setStatus("Confirming card authorization...", "muted");

        const result = await stripe.confirmCardSetup(clientSecret, {
          payment_method: {
            card: card
          }
        });

        if (result.error) {
          throw new Error(result.error.message || "Card confirmation failed.");
        }

        const setupIntent = result.setupIntent;
        const paymentMethodId = setupIntent.payment_method;

        if (!paymentMethodId) {
          throw new Error("Stripe did not return a payment method.");
        }

        const saveRes = await fetch(
          "https://vxbujgzswbakdjnfgetk.supabase.co/functions/v1/confirm-autotopup-payment-method",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              agent_id: agentId,
              stripe_customer_id: stripeCustomerId,
              stripe_payment_method_id: paymentMethodId
            })
          }
        );

        const saveData = await saveRes.json();

        if (!saveRes.ok || !saveData.ok) {
          throw new Error(saveData.error || "Failed to save automatic billing method.");
        }

        setupCompleted = true;
        startBtn.disabled = true;
        confirmBtn.disabled = true;
        agentIdInput.readOnly = true;

        setStatus(
          "Automatic economy enabled successfully. This agent is now configured for future automatic top-ups.",
          "success"
        );
      } catch (error) {
        setStatus(error?.message || "Unexpected error while confirming card.", "error");
      } finally {
        if (!setupCompleted) {
          setLoading(confirmBtn, false, "Confirming...", "Confirm Card");
        }
      }
    }

    startBtn.addEventListener("click", startSetup);
    confirmBtn.addEventListener("click", confirmCard);
  </script>
</body>
</html>
