<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Network Lab • CFO Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#07111f;color:#fff;font-family:Arial}
.wrap{max-width:1450px;margin:auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.card,.panel{background:#0f1c31;border:1px solid #23344c;border-radius:18px;padding:18px}
.value{font-size:30px;font-weight:900}
.label{font-size:13px;color:#9fb6d3}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #23344c;text-align:left;font-size:14px}
button{padding:12px 16px;border:0;border-radius:12px;font-weight:700;cursor:pointer}
input{width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid #23344c;background:#08111f;color:#fff}
.login{max-width:420px;margin:80px auto}
.ok{color:#22c55e}.warn{color:#f59e0b}.bad{color:#ef4444}
</style>
</head>
<body>

<div class="wrap">

<div id="loginBox" class="login panel">
<h1>AI Network Lab</h1>
<input id="email" placeholder="E-mail">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<div id="loginStatus"></div>
</div>

<div id="dash" style="display:none">

<h1>🚀 CFO Elite Dashboard</h1>
<p id="updated"></p>

<div class="grid">
<div class="card"><div class="label">Receita Hoje</div><div class="value" id="r1">$0</div></div>
<div class="card"><div class="label">Receita 7d</div><div class="value" id="r7">$0</div></div>
<div class="card"><div class="label">Agentes Ativos</div><div class="value" id="aa">0</div></div>
<div class="card"><div class="label">Externos</div><div class="value" id="ex">0</div></div>
</div>

<br>

<div class="panel">
<h2>🩺 Saúde do Sistema</h2>
<table>
<tbody>
<tr><td>Status Geral</td><td id="sys_status">...</td></tr>
<tr><td>Tasks 24h</td><td id="sys_tasks">0</td></tr>
<tr><td>Falhas Runtime</td><td id="sys_fail">0</td></tr>
<tr><td>Problemas Billing</td><td id="sys_bill">0</td></tr>
<tr><td>Eventos Ledger</td><td id="sys_ledger">0</td></tr>
</tbody>
</table>
</div>

<br>

<div class="panel">
<h2>📈 Receita</h2>
<canvas id="chart"></canvas>
</div>

<br>

<div class="panel">
<h2>🧠 Agent Intelligence</h2>
<table>
<thead>
<tr>
<th>Agente</th>
<th>Score</th>
<th>Tasks</th>
<th>Créditos</th>
<th>Receita</th>
<th>Status</th>
</tr>
</thead>
<tbody id="intel"></tbody>
</table>
</div>

</div>
</div>

<script>
const client = supabase.createClient(
"https://vxbujgzswbakdjnfgetk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4YnVqZ3pzd2Jha2RqbmZnZXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMjczNzMsImV4cCI6MjA4NTYwMzM3M30.__xPyuta8X-U18Bofb-wkDeDexUtsNwfAivzuDFDXN0"
);

let chart;

async function login(){
 const {error}=await client.auth.signInWithPassword({
   email:email.value,password:password.value
 });
 if(error){loginStatus.innerText=error.message;return;}
 loginBox.style.display="none";
 dash.style.display="block";
 load();
}

async function load(){

const {data:m}=await client.rpc("cfo_dashboard_portal").single();

r1.innerText="$"+Number(m.revenue_today_usd).toFixed(2);
r7.innerText="$"+Number(m.revenue_7d_usd).toFixed(2);
aa.innerText=m.active_agents;
ex.innerText=m.external_agents;

const {data:h}=await client.rpc("cfo_system_health").single();

sys_status.innerText=h.system_status;
sys_status.className =
 h.system_status==="HEALTHY" ? "ok value" :
 h.system_status.includes("RISK") ? "bad value" :
 "warn value";

sys_tasks.innerText=h.tasks_24h;
sys_fail.innerText=h.tasks_failed_24h;
sys_bill.innerText=h.billing_problems_24h;
sys_ledger.innerText=h.ledger_events_24h;

const {data:rev}=await client.rpc("cfo_revenue_daily");
draw(rev);

const {data:intel}=await client.rpc("cfo_agent_intelligence");
intel.innerHTML=intel.map(x=>`
<tr>
<td>${x.name}</td>
<td>${x.ecosystem_score}</td>
<td>${x.tasks_24h}</td>
<td>${x.credits_spent_24h}</td>
<td>$${Number(x.revenue_usd).toFixed(2)}</td>
<td>${x.operational_status}</td>
</tr>
`).join("");

updated.innerText="Atualizado: "+new Date().toLocaleString("pt-BR");
}

function draw(rows){
const labels=rows.map(x=>new Date(x.day).toLocaleDateString("pt-BR"));
const vals=rows.map(x=>x.revenue_usd);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"USD",data:vals}]},
options:{plugins:{legend:{labels:{color:"#fff"}}}}
});
}

client.auth.getSession().then(({data})=>{
 if(data.session){
   loginBox.style.display="none";
   dash.style.display="block";
   load();
 }
});

setInterval(()=>{if(dash.style.display!="none")load()},20000);
</script>
</body>
</html>
