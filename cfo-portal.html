<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Network Lab • CFO Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#07111f;color:#fff;font-family:Arial}
.wrap{max-width:1450px;margin:auto;padding:24px}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}
.actions{display:flex;gap:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.card,.panel{background:#0f1c31;border:1px solid #23344c;border-radius:18px;padding:18px}
.value{font-size:30px;font-weight:900}
.label{font-size:13px;color:#9fb6d3}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #23344c;text-align:left;font-size:14px}
button{padding:12px 18px;border:0;border-radius:14px;font-weight:800;cursor:pointer}
.refresh-btn{background:linear-gradient(135deg,#22c55e,#86efac);color:#052e16}
.logout{background:#334155;color:#fff}
input{width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid #23344c;background:#08111f;color:#fff}
.login{max-width:420px;margin:80px auto}
.ok{color:#22c55e}.warn{color:#f59e0b}.bad{color:#ef4444}
h1,h2{margin-top:0}
.error{color:#ef4444;font-size:13px;margin-top:8px}
@media(max-width:800px){.top{flex-direction:column;align-items:flex-start}.actions{width:100%;flex-direction:column}button{width:100%}}
</style>
</head>

<body>
<div class="wrap">

<div id="loginBox" class="login panel">
<h1>AI Network Lab</h1>
<input id="email" placeholder="E-mail">
<input id="password" type="password" placeholder="Senha">
<button class="refresh-btn" onclick="login()">Entrar</button>
<div id="loginStatus" class="error"></div>
</div>

<div id="dash" style="display:none">

<div class="top">
<div>
<h1>🚀 CFO Elite Dashboard</h1>
<p id="updated">Carregando...</p>
</div>
<div class="actions">
<button id="refreshBtn" class="refresh-btn" onclick="load()">🟢 Atualizar agora</button>
<button class="logout" onclick="logout()">Sair</button>
</div>
</div>

<div class="panel">
<h2>📡 Growth Radar</h2>
<div class="grid">
<div class="card"><div class="label">Externos Hoje</div><div class="value" id="gr1">0</div></div>
<div class="card"><div class="label">Externos 7 Dias</div><div class="value" id="gr2">0</div></div>
<div class="card"><div class="label">Externos Total</div><div class="value" id="gr3">0</div></div>
<div class="card"><div class="label">Externos Ativos</div><div class="value" id="gr4">0</div></div>
<div class="card"><div class="label">Stripe Hoje</div><div class="value" id="gr5">0</div></div>
<div class="card"><div class="label">Stripe 7 Dias</div><div class="value" id="gr6">0</div></div>
</div>
</div>

<br>

<div class="grid">
<div class="card"><div class="label">Receita Hoje</div><div class="value" id="r1">$0</div></div>
<div class="card"><div class="label">Receita 7 Dias</div><div class="value" id="r7">$0</div></div>
<div class="card"><div class="label">Agentes Ativos</div><div class="value" id="aa">0</div></div>
<div class="card"><div class="label">Agentes Externos</div><div class="value" id="ex">0</div></div>
</div>

<!-- restante do dashboard permanece -->
</div>
</div>

<script>
const client = supabase.createClient(
"https://vxbujgzswbakdjnfgetk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

async function login(){
const {error}=await client.auth.signInWithPassword({
email:email.value,password:password.value
});
if(error){loginStatus.innerText=error.message;return;}
loginBox.style.display="none";
dash.style.display="block";
load();
}

async function logout(){
await client.auth.signOut();
dash.style.display="none";
loginBox.style.display="block";
}

async function load(){

const {data:g}=await client.rpc("cfo_growth_radar").single();

gr1.innerText=g.external_today;
gr2.innerText=g.external_7d;
gr3.innerText=g.external_total;
gr4.innerText=g.external_active;
gr5.innerText=g.stripe_onboarding_today;
gr6.innerText=g.stripe_onboarding_7d;

updated.innerText="Atualizado: "+new Date().toLocaleString("pt-BR");
}

client.auth.getSession().then(({data})=>{
if(data.session){
loginBox.style.display="none";
dash.style.display="block";
load();
}
});
</script>

</body>
</html>
